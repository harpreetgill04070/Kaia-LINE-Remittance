<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaia Remittance</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1DB446 0%, #00A86B 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px 20px;
        }

        .transaction-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #1DB446;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .transaction-item:last-child {
            margin-bottom: 0;
        }

        .label {
            font-weight: 600;
            color: #666;
        }

        .value {
            font-weight: 700;
            color: #333;
        }

        .amount {
            font-size: 18px;
            color: #1DB446;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .wallet-section {
            margin: 20px 0;
        }

        .wallet-button {
            width: 100%;
            padding: 15px;
            background: #1DB446;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .wallet-button:hover {
            background: #00A86B;
            transform: translateY(-2px);
        }

        .wallet-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .wallet-info {
            background: #e8f5e8;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }

        .wallet-info.show {
            display: block;
        }

        .wallet-address {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .execute-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
        }

        .execute-button.show {
            display: block;
        }

        .execute-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1DB446;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Kaia Remittance</h1>
            <p>Secure & Fast Token Transfers</p>
        </div>

        <div class="content">
            <div class="transaction-card">
                <h3 style="margin-bottom: 15px; color: #333;">Transaction Details</h3>
                <div class="transaction-item">
                    <span class="label">Amount:</span>
                    <span class="value amount" id="amount">-</span>
                </div>
                <div class="transaction-item">
                    <span class="label">Token:</span>
                    <span class="value" id="token">-</span>
                </div>
                <div class="transaction-item">
                    <span class="label">Recipient:</span>
                    <span class="value" id="recipient">-</span>
                </div>
                <div class="transaction-item">
                    <span class="label">Status:</span>
                    <span class="status pending" id="status">Pending</span>
                </div>
            </div>

            <div class="wallet-section">
                <button class="wallet-button" id="connectWallet" onclick="connectWallet()">
                    🔗 Connect Wallet
                </button>
                
                <div class="wallet-info" id="walletInfo">
                    <div><strong>Connected:</strong> <span id="walletAddress">-</span></div>
                    <div><strong>Balance:</strong> <span id="tokenBalance">-</span> <span id="tokenSymbol">TT</span></div>
                </div>
            </div>

            <button class="execute-button" id="executeTransaction" onclick="executeTransaction()">
                🚀 Execute Transaction
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing transaction...</p>
            </div>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
        </div>
    </div>

    <script>
        let liffId = '2008100802-5MpxMWoL';
        let intentData = {};
        let userWallet = null;
        let backendUrl = 'http://localhost:3000';

        // Initialize LIFF
        async function initializeLiff() {
            try {
                await liff.init({ liffId: liffId });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // Get URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                intentData = {
                    intentId: urlParams.get('intentId'),
                    amount: urlParams.get('amount'),
                    token: urlParams.get('token'),
                    recipient: urlParams.get('recipient'),
                    routerAddress: urlParams.get('routerAddress'),
                    networkName: urlParams.get('networkName'),
                    chainId: urlParams.get('chainId')
                };

                // Display transaction details
                document.getElementById('amount').textContent = intentData.amount + ' ' + intentData.token;
                document.getElementById('token').textContent = intentData.token;
                document.getElementById('recipient').textContent = '@' + intentData.recipient;

                console.log('Intent Data:', intentData);

            } catch (error) {
                console.error('LIFF initialization failed:', error);
                showError('Failed to initialize LINE LIFF');
            }
        }

        // Connect wallet (simulated for demo)
        async function connectWallet() {
            try {
                // Simulate wallet connection
                userWallet = '0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266'; // Demo address
                
                document.getElementById('walletAddress').textContent = userWallet;
                document.getElementById('walletInfo').classList.add('show');
                document.getElementById('executeTransaction').classList.add('show');
                document.getElementById('connectWallet').textContent = '✅ Wallet Connected';
                document.getElementById('connectWallet').disabled = true;

                // Get token balance
                await getTokenBalance();

            } catch (error) {
                console.error('Wallet connection failed:', error);
                showError('Failed to connect wallet');
            }
        }

        // Get token balance from backend

        async function getTokenBalance() {
            try {
                // Fallback to TT if token is missing or undefined
                let token = intentData.token;
                if (!token || token === 'undefined') {
                    token = 'TT';
                    intentData.token = token;
                    document.getElementById('token').textContent = token;
                }
                const response = await fetch(`${backendUrl}/balance/${userWallet}/${token}`);
                const data = await response.json();
                document.getElementById('tokenBalance').textContent = data.balance;
                document.getElementById('tokenSymbol').textContent = data.token;
            } catch (error) {
                console.error('Failed to get balance:', error);
            }
        }

        // Execute transaction
        async function executeTransaction() {
            try {
                showLoading(true);
                hideError();
                hideSuccess();

                // Create transaction via backend
                const response = await fetch(`${backendUrl}/create-transaction`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        intentId: intentData.intentId,
                        userAddress: userWallet
                    })
                });

                const transactionData = await response.json();

                if (transactionData.success) {
                    // Simulate transaction execution
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    
                    document.getElementById('status').textContent = 'Completed';
                    document.getElementById('status').className = 'status completed';
                    showSuccess('Transaction completed successfully!');
                    
                    // Update intent status
                    intentData.status = 'completed';
                    
                } else {
                    showError(transactionData.error || 'Transaction failed');
                }

            } catch (error) {
                console.error('Transaction execution failed:', error);
                showError('Transaction execution failed');
            } finally {
                showLoading(false);
            }
        }

        // UI Helper functions
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.add('show');
            } else {
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showSuccess(message) {
            const success = document.getElementById('success');
            success.textContent = message;
            success.classList.add('show');
        }

        function hideSuccess() {
            document.getElementById('success').classList.remove('show');
        }

        // Initialize when page loads
        window.addEventListener('load', initializeLiff);
    </script>
</body>
</html>
